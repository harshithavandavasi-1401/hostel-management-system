<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-3 shadow">
    <span class="navbar-brand">Student Dashboard</span>
    <a href="/logout" class="btn btn-light">Logout</a>
</nav>

<div class="container mt-4">

<!-- RAISE COMPLAINT -->
<div class="card shadow p-4 mb-4">
<h4 class="mb-3">Raise Complaint</h4>

<form action="/submit_complaint" method="POST">

<!-- AUTO-FILLED (READONLY) -->
<input class="form-control mb-2" value="{{ student_name }}" readonly>
<input class="form-control mb-2" value="{{ student_id }}" readonly>
<input class="form-control mb-2" value="{{ room_no }}" readonly>

<!-- HIDDEN VALUES (for backend) -->
<input type="hidden" name="student_name" value="{{ student_name }}">
<input type="hidden" name="student_id" value="{{ student_id }}">
<input type="hidden" name="room_no" value="{{ room_no }}">

<!-- ISSUE -->
<select class="form-control mb-3" name="issue_type" required>
<option value="">Select Complaint</option>
<option>Water</option>
<option>Electricity</option>
<option>WiFi</option>
<option>Cleaning</option>
</select>

<button class="btn btn-primary w-100">Submit Complaint</button>

</form>
</div>

<!-- COMPLAINTS TABLE -->
<div class="card shadow p-4">
<h4>Your Complaints</h4>

<div class="table-responsive">
<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>Room</th>
<th>Complaint</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for c in complaints %}
<tr>
<td>{{ c[3] }}</td>   <!-- room_no -->
<td>{{ c[1] }}</td>   <!-- issue_type -->

<td>
{% if c[5] == 'pending' %}
<span class="badge bg-danger">Pending</span>
{% else %}
<span class="badge bg-success">Resolved</span>
{% endif %}
</td>

</tr>
{% endfor %}

</tbody>

</table>
</div>

</div>

</div>

</body>
</html>
