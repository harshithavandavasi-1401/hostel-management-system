<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h4>Student Registration</h4>

<form method="POST">

<input class="form-control mb-2" name="name" placeholder="Name" required>
<input class="form-control mb-2" name="reg" placeholder="Registration Number" required>
<input class="form-control mb-2" name="phone" placeholder="Phone">
<input class="form-control mb-2" name="room" placeholder="Room Number" required>
<input class="form-control mb-2" name="password" placeholder="Password" type="password" required>

<button class="btn btn-primary w-100">Register</button>

</form>

<a href="/" class="btn btn-link mt-2">Back to Login</a>

</div>
</div>

</body>
</html>
