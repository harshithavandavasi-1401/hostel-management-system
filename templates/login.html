<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex justify-content-center align-items-center vh-100">

<div class="card p-4">
<h3>Hostel Login</h3>

<form action="/login" method="POST">

<select name="role" class="form-control mb-2">
<option value="student">Student</option>
<option value="warden">Warden</option>
<option value="worker">Worker</option>
</select>

<input name="user_id" class="form-control mb-2" placeholder="ID">
<input name="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-dark w-100">Login</button>

</form>

<a href="/register" class="btn btn-success w-100 mt-2">
New Student? Register
</a>

</div>

</body>
</html>
